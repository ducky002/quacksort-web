<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receive Photos - QuackSort</title>
    <link rel="icon" type="image/png" href="QuackSort.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .gallery-container {
            padding: 4rem 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease-out;
        }

        .gallery-container.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .share-header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .folder-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-color);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 2rem;
        }

        .image-card {
            background: var(--card-dark);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
        }

        .image-card:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .image-card:hover img {
            transform: scale(1.08);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-card:hover .card-overlay {
            opacity: 1;
        }

        .download-btn {
            background: white;
            color: black;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
        }

        .download-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.1);
        }

        .download-btn svg {
            width: 16px;
            height: 16px;
        }
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .download-btn:hover {
            background: var(--accent-color);
            color: white;
            transform: rotate(-10deg);
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-bottom-color: var(--primary-color);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            padding: 4rem 0;
            text-align: center;
            color: var(--text-dim);
        }

        .download-all-bar {
            position: sticky;
            top: 20px;
            z-index: 100;
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .download-all-pill {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: var(--transition);
        }

        .download-all-pill:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .connection-error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            max-width: 500px;
            margin: 2rem auto;
        }
    </style>
</head>

<body>
    <div class="background-blob"></div>

    <div class="web-container">
        <header class="web-nav">
            <div class="logo-area">
                <img src="QuackSort.png" alt="Q" class="logo-icon">
                <span class="logo-text">QuackSort</span>
            </div>
            <div class="nav-right">
                <a href="index.html" class="nav-link">Home</a>
                <a href="register.html" class="nav-link register-link">Register for Event</a>
            </div>
        </header>

        <section id="loading-view" class="hero-section">
            <div class="loader"></div>
            <h2 style="margin-top: 1.5rem;">Connecting to your Peer...</h2>
            <p class="hero-subtitle">Establishing a secure peer-to-peer connection.</p>
        </section>

        <section id="error-view" class="hero-section" style="display: none;">
            <div class="connection-error">
                <h3 style="margin-bottom: 1rem;">Connection Lost</h3>
                <p>We couldn't reach the sharing device. Make sure the sender's app is open and "QuackShare" is active.
                </p>
                <button onclick="window.location.reload()" class="btn secondary" style="margin-top: 1.5rem;">Retry
                    Connection</button>
            </div>
        </section>

        <section id="gallery-view" class="gallery-container" style="display: none;">
            <div class="download-all-bar">
                <div class="download-all-pill">
                    <span id="items-count" style="font-weight: 600; color: var(--text-dim);">Scanning...</span>
                    <button id="btn-download-zip" class="btn primary small">Download All (ZIP)</button>
                </div>
            </div>

            <div class="share-header">
                <div class="folder-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                    </svg>
                    <span id="folder-name">Photos</span>
                </div>
                <h1 class="hero-title">Your shared <span class="highlight">memories</span></h1>
            </div>

            <div id="image-grid" class="image-grid">
                <!-- Images will be injected here -->
            </div>
        </section>
    </div>

    <script src="receive_script.js"></script>
</body>

</html>
